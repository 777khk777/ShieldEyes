<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Namuhaus Sensor Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #2c3e50; }
    .chart-container { position: relative; height: 260px; background: white; border-radius: 10px; padding: 10px; margin-bottom: 25px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    @media (max-width: 600px) { .chart-container { height: 200px; } }
    .sensor { background: white; border-radius: 10px; padding: 20px; margin-bottom: 25px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .sensor h2 { margin-bottom: 10px; color: #34495e; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    .reading { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 6px 0; font-size: 0.9em; }
    .timestamp { color: #888; }
    .temp { color: #e74c3c; font-weight: bold; }
    .hum { color: #3498db; font-weight: bold; }
    button { background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
    #status { color: #27ae60; margin-bottom: 10px; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>🌡 Namuhaus Sensor Dashboard</h1>
  <div id="status"></div>
  <button onclick="loadData()">↻ Refresh</button>

  <div class="chart-container"><canvas id="tempChart"></canvas></div>
  <div class="chart-container"><canvas id="humChart"></canvas></div>
  <div id="readings"></div>

<script>
function loadData() {
  document.getElementById("status").textContent = "Loading...";

  // Assuming readings.json is in the same folder as this HTML file
  fetch("readings.json")
    .then(r => r.json())
    .then(rawData => {
      document.getElementById("status").textContent = "Last updated: " + new Date().toLocaleTimeString();

      // 1. FLATTEN DATA: Your JSON has nested "readings" arrays
      const data = [];
      rawData.forEach(entry => {
        if (entry.readings) {
          entry.readings.forEach(sensorRead => {
            data.push({
              sensor: sensorRead.sensor,
              temperature: sensorRead.temperature,
              humidity: sensorRead.humidity,
              timestamp: entry.timestamp
            });
          });
        } else if (entry.sensor) {
          data.push(entry); // Handles the flat objects at the end of your file
        }
      });

      const container = document.getElementById("readings");
      if (!data.length) {
        container.innerHTML = "<p>No readings yet.</p>";
        return;
      }

      // 2. GROUP BY SENSOR
      const grouped = {};
      data.forEach(r => {
        if (!grouped[r.sensor]) grouped[r.sensor] = [];
        grouped[r.sensor].push(r);
      });

      container.innerHTML = "";

      // 3. RENDER UI LISTS
      Object.keys(grouped).forEach(sensor => {
        const readings = grouped[sensor].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 12);
        const div = document.createElement("div");
        div.className = "sensor";
        div.innerHTML = `
          <h2>${sensor}</h2>
          <div>
            ${readings.map(r => `
              <div class="reading">
                <span class="timestamp">${r.timestamp}</span>
                <span>
                  <span class="temp">${Number(r.temperature).toFixed(1)}°C</span>
                  &nbsp;
                  <span class="hum">${r.humidity}%</span>
                </span>
              </div>
            `).join("")}
          </div>
        `;
        container.appendChild(div);
      });

      // 4. PREPARE CHART DATA
      const allTimestamps = [...new Set(data.map(r => r.timestamp))].sort().slice(-12);
      const colors = ["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#e91e63"];
      const tempDatasets = [];
      const humDatasets = [];

      Object.keys(grouped).forEach((sensor, i) => {
        const sensorData = grouped[sensor];
        
        // Map data points to their specific timestamps
        const tData = allTimestamps.map(t => {
            const found = sensorData.find(sd => sd.timestamp === t);
            return found ? found.temperature : null;
        });
        const hData = allTimestamps.map(t => {
            const found = sensorData.find(sd => sd.timestamp === t);
            return found ? found.humidity : null;
        });

        tempDatasets.push({ label: sensor, data: tData, borderColor: colors[i % colors.length], borderWidth: 2.5, pointRadius: 2, fill: false, spanGaps: true });
        humDatasets.push({ label: sensor, data: hData, borderColor: colors[i % colors.length], borderWidth: 2.5, pointRadius: 2, fill: false, spanGaps: true });
      });

      if (window.tempChart instanceof Chart) window.tempChart.destroy();
      if (window.humChart instanceof Chart) window.humChart.destroy();

      window.tempChart = new Chart(document.getElementById("tempChart"), {
        type: "line",
        data: { labels: allTimestamps, datasets: tempDatasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { title: { display: true, text: "Temperature (°C)" } },
          scales: { x: { ticks: { maxTicksLimit: 6, maxRotation: 45, autoSkip: true, font: { size: 11 }, callback: function(val) { const l = this.getLabelForValue(val); return l ? l.substring(11, 16) : ''; } } } }
        }
      });

      window.humChart = new Chart(document.getElementById("humChart"), {
        type: "line",
        data: { labels: allTimestamps, datasets: humDatasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { title: { display: true, text: "Humidity (%)" } },
          scales: { x: { ticks: { maxTicksLimit: 6, maxRotation: 45, autoSkip: true, font: { size: 11 }, callback: function(val) { const l = this.getLabelForValue(val); return l ? l.substring(11, 16) : ''; } } } }
        }
      });
    })
    .catch(err => {
      console.error(err);
      document.getElementById("status").textContent = "Error loading local readings.json.";
    });
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
