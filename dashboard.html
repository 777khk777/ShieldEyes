<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Namuhaus Sensor Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #2c3e50; }
    #status { color: #27ae60; margin-bottom: 10px; font-size: 0.9em; }

    /* Refresh button */
    .refresh-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-bottom: 16px; }

    /* Range selector bar */
    .range-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .range-bar::-webkit-scrollbar { display: none; }
    .range-btn { flex-shrink: 0; background: white; color: #2c3e50; border: 1.5px solid #ddd; padding: 7px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85em; white-space: nowrap; transition: all 0.15s; }
    .range-btn:hover { border-color: #2c3e50; }
    .range-btn.active { background: #2c3e50; color: white; border-color: #2c3e50; }

    /* Charts */
    .chart-container { position: relative; height: 260px; background: white; border-radius: 10px; padding: 10px; margin-bottom: 25px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    @media (max-width: 600px) { .chart-container { height: 220px; } }

    /* Sensor reading lists */
    .sensor { background: white; border-radius: 10px; padding: 20px; margin-bottom: 25px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .sensor h2 { margin-bottom: 10px; color: #34495e; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    .reading { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 6px 0; font-size: 0.9em; }
    .timestamp { color: #888; }
    .temp { color: #e74c3c; font-weight: bold; }
    .hum { color: #3498db; font-weight: bold; }
    .co2 { color: #00bcd4; font-weight: bold; }
    .no-data { color: #999; font-style: italic; padding: 10px 0; }

    /* 3D Sensor Map collapsible section */
    .map-section { margin-bottom: 25px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .map-toggle { width: 100%; display: flex; justify-content: space-between; align-items: center; background: #2c3e50; color: white; border: none; padding: 12px 18px; font-size: 0.95em; font-weight: 600; cursor: pointer; letter-spacing: 0.02em; }
    .map-toggle:hover { background: #3d5166; }
    .map-arrow { transition: transform 0.25s ease; display: inline-block; }
    .map-section.collapsed .map-arrow { transform: rotate(180deg); }
    .map-body { max-height: 460px; overflow: hidden; transition: max-height 0.3s ease; }
    .map-section.collapsed .map-body { max-height: 0; }
    #mapFrame { width: 100%; height: 460px; border: none; display: block; }
  </style>
</head>
<body>
  <h1>🌡 Namuhaus Sensor Dashboard</h1>
  <div id="status"></div>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>

  <!-- Date range selector -->
  <div class="range-bar" id="rangeBar">
    <button class="range-btn" data-range="today">Today</button>
    <button class="range-btn" data-range="yesterday">Yesterday</button>
    <button class="range-btn" data-range="thisweek">This week</button>
    <button class="range-btn" data-range="thismonth">This month</button>
    <button class="range-btn" data-range="thisyear">This year</button>
    <button class="range-btn active" data-range="last24h">Last 24 hours</button>
    <button class="range-btn" data-range="last7d">Last 7 days</button>
    <button class="range-btn" data-range="last30d">Last 30 days</button>
  </div>

  <!-- 3D Sensor Map -->
  <div class="map-section" id="mapSection">
    <button class="map-toggle" id="mapToggle" onclick="toggleMap()" aria-expanded="true" aria-controls="mapBody">
      <span>📍 Sensor Map</span>
      <span class="map-arrow">▲</span>
    </button>
    <div class="map-body" id="mapBody">
      <iframe id="mapFrame" src="3Dhouse.html" title="3D Sensor Map" loading="lazy" allowfullscreen></iframe>
    </div>
  </div>

  <div class="chart-container"><canvas id="tempChart"></canvas></div>
  <div class="chart-container"><canvas id="humChart"></canvas></div>
  <div class="chart-container" id="co2ChartWrap" style="display:none"><canvas id="co2Chart"></canvas></div>
  <div id="readings"></div>

<script>
  const COLORS = ["#e94560","#00b4d8","#06d6a0","#ffd166","#a855f7","#ff6b35","#4cc9f0","#f72585","#80b918","#fb8500"];
  let allData = [];
  let currentRange = "last24h";

  // ── Date range helpers (string-based — no timezone issues) ──────────────────
  // Timestamps are stored as "YYYY-MM-DD HH:MM:SS" in sensor local time.
  // We derive "now" from the newest timestamp so the clock always matches the data.

  function pad(n) { return String(n).padStart(2, "0"); }

  function addDays(dateStr, days) {
    // dateStr = "YYYY-MM-DD", returns new "YYYY-MM-DD"
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() + days);
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  }

  function getDateRange(range, newestTS) {
    // Use the newest timestamp as "now" so we stay in sensor time
    const nowDate = newestTS.substring(0, 10);   // "YYYY-MM-DD"
    const nowTime = newestTS.substring(11, 19);   // "HH:MM:SS"
    const endStr  = newestTS;

    if (range === "today") {
      return { start: nowDate + " 00:00:00", end: endStr };
    }
    if (range === "yesterday") {
      const yd = addDays(nowDate, -1);
      return { start: yd + " 00:00:00", end: yd + " 23:59:59" };
    }
    if (range === "thisweek") {
      const dow = new Date(nowDate + "T00:00:00").getDay(); // 0=Sun
      const daysToMon = (dow === 0) ? 6 : dow - 1;
      return { start: addDays(nowDate, -daysToMon) + " 00:00:00", end: endStr };
    }
    if (range === "thismonth") {
      return { start: nowDate.substring(0, 7) + "-01 00:00:00", end: endStr };
    }
    if (range === "thisyear") {
      return { start: nowDate.substring(0, 4) + "-01-01 00:00:00", end: endStr };
    }
    if (range === "last24h") {
      return { start: addDays(nowDate, -1) + " " + nowTime, end: endStr };
    }
    if (range === "last7d") {
      return { start: addDays(nowDate, -7) + " " + nowTime, end: endStr };
    }
    if (range === "last30d") {
      return { start: addDays(nowDate, -30) + " " + nowTime, end: endStr };
    }
    return { start: "0000-00-00 00:00:00", end: endStr };
  }

  function filterByRange(data, range) {
    if (!data.length) return [];
    const newest = [...data].sort((a, b) => b.timestamp.localeCompare(a.timestamp))[0].timestamp;
    const { start, end } = getDateRange(range, newest);
    return data.filter(r => r.timestamp >= start && r.timestamp <= end);
  }

  // ── Rendering ────────────────────────────────────────────────────────────────
  function renderDashboard(range) {
    const data = filterByRange(allData, range);
    const container = document.getElementById("readings");

    if (!data.length) {
      container.innerHTML = "<p class='no-data'>No readings in this time range.</p>";
      if (window.tempChart instanceof Chart) window.tempChart.destroy();
      if (window.humChart instanceof Chart) window.humChart.destroy();
      return;
    }

    // Group by sensor
    const grouped = {};
    data.forEach(r => {
      if (!grouped[r.sensor]) grouped[r.sensor] = [];
      grouped[r.sensor].push(r);
    });

    // Sensor reading lists (last 12 per sensor within range)
    container.innerHTML = "";
    Object.keys(grouped).sort().forEach(sensor => {
      const readings = grouped[sensor].sort((a, b) => b.timestamp.localeCompare(a.timestamp)).slice(0, 12);
      const div = document.createElement("div");
      div.className = "sensor";
      div.innerHTML = `
        <h2>${sensor}</h2>
        <div>
          ${readings.map(r => `
            <div class="reading">
              <span class="timestamp">${r.timestamp}</span>
              <span>
                <span class="temp">${Number(r.temperature).toFixed(1)}°C</span>
                &nbsp;
                <span class="hum">${r.humidity}%</span>
                ${r.co2 !== null ? `&nbsp;<span class="co2">${r.co2}ppm</span>` : ''}
              </span>
            </div>
          `).join("")}
        </div>
      `;
      container.appendChild(div);
    });

    // Chart data — all timestamps in range
    const allTimestamps = [...new Set(data.map(r => r.timestamp))].sort();
    const tempDatasets = [], humDatasets = [];

    Object.keys(grouped).sort().forEach((sensor, i) => {
      const sd = grouped[sensor];
      const tData = allTimestamps.map(t => { const f = sd.find(x => x.timestamp === t); return f ? Number(f.temperature) : null; });
      const hData = allTimestamps.map(t => { const f = sd.find(x => x.timestamp === t); return f ? Number(f.humidity)    : null; });
      const color = COLORS[i % COLORS.length];
      tempDatasets.push({ label: sensor, data: tData, borderColor: color, borderWidth: 2.5, pointRadius: 1, fill: false, spanGaps: true });
      humDatasets.push({ label: sensor, data: hData, borderColor: color, borderWidth: 2.5, pointRadius: 1, fill: false, spanGaps: true });
    });

    // X-axis label: show HH:MM, or "MM-DD HH:MM" when range spans multiple days
    const multiDay = ["thisweek","thismonth","thisyear","last7d","last30d"].includes(range);
    const tickFmt = function(val) {
      const l = this.getLabelForValue(val);
      if (!l) return '';
      return multiDay ? l.substring(5, 16).replace(" ", "\n") : l.substring(11, 16);
    };
    const chartOpts = {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { usePointStyle: true, pointStyle: 'circle', boxWidth: 8, boxHeight: 8 } } },
      scales: { x: { ticks: { maxTicksLimit: 6, maxRotation: 45, autoSkip: true, font: { size: 11 }, callback: tickFmt } } }
    };

    if (window.tempChart instanceof Chart) window.tempChart.destroy();
    if (window.humChart instanceof Chart) window.humChart.destroy();
    if (window.co2Chart  instanceof Chart) window.co2Chart.destroy();

    window.tempChart = new Chart(document.getElementById("tempChart"), {
      type: "line", data: { labels: allTimestamps, datasets: tempDatasets },
      options: { ...chartOpts, plugins: { title: { display: true, text: "Temperature (°C)" } }, scales: { ...chartOpts.scales } }
    });
    window.humChart = new Chart(document.getElementById("humChart"), {
      type: "line", data: { labels: allTimestamps, datasets: humDatasets },
      options: { ...chartOpts, plugins: { title: { display: true, text: "Humidity (%)" } }, scales: { ...chartOpts.scales } }
    });

    // CO2 chart — only shown when Sensor 0 data exists
    const co2Readings = data.filter(r => r.co2 !== null);
    const co2Wrap = document.getElementById("co2ChartWrap");
    if (co2Readings.length) {
      co2Wrap.style.display = "block";
      const co2TS = [...new Set(co2Readings.map(r => r.timestamp))].sort();
      const co2Dataset = [{
        label: "Sensor 0 (CO₂)",
        data: co2TS.map(t => { const f = co2Readings.find(x => x.timestamp === t); return f ? f.co2 : null; }),
        borderColor: "#00bcd4", borderWidth: 2.5, pointRadius: 2, fill: false, spanGaps: true
      }];
      window.co2Chart = new Chart(document.getElementById("co2Chart"), {
        type: "line", data: { labels: co2TS, datasets: co2Dataset },
        options: { ...chartOpts, plugins: { title: { display: true, text: "CO₂ (ppm)" } }, scales: { ...chartOpts.scales } }
      });
    } else {
      co2Wrap.style.display = "none";
    }
  }

  // ── Data loading ─────────────────────────────────────────────────────────────
  function loadData() {
    document.getElementById("status").textContent = "Loading...";
    fetch("readings.json")
      .then(r => r.json())
      .then(rawData => {
        document.getElementById("status").textContent = "Last updated: " + new Date().toLocaleTimeString();
        allData = [];
        rawData.forEach(entry => {
          if (entry.r) {
            // Compact format: {ts, r: [[num,temp,hum] or [0,temp,hum,co2]]}
            entry.r.forEach(r => allData.push({
              sensor:      "Sensor " + r[0],
              temperature: r[1],
              humidity:    r[2],
              co2:         r.length === 4 ? r[3] : null,  // only Sensor 0 has 4 elements
              timestamp:   entry.ts
            }));
          } else if (entry.readings) {
            // Old format fallback
            entry.readings.forEach(sr => allData.push({
              sensor: sr.sensor, temperature: sr.temperature,
              humidity: sr.humidity, co2: null, timestamp: entry.timestamp
            }));
          }
        });
        renderDashboard(currentRange);
      })
      .catch(err => {
        console.error(err);
        document.getElementById("status").textContent = "Error loading readings.json.";
      });
  }

  // ── Range button clicks ───────────────────────────────────────────────────────
  document.getElementById("rangeBar").addEventListener("click", e => {
    const btn = e.target.closest(".range-btn");
    if (!btn) return;
    document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentRange = btn.dataset.range;
    renderDashboard(currentRange);
  });

  loadData();
  setInterval(loadData, 30000);

  // ── Sensor Map toggle ──────────────────────────────────────────────────────
  (function () {
    const LS_KEY  = 'sensorMapCollapsed';
    const section = document.getElementById('mapSection');
    const toggle  = document.getElementById('mapToggle');

    if (localStorage.getItem(LS_KEY) === 'true') {
      section.classList.add('collapsed');
      toggle.setAttribute('aria-expanded', 'false');
    }

    window.toggleMap = function () {
      const nowCollapsed = section.classList.toggle('collapsed');
      toggle.setAttribute('aria-expanded', String(!nowCollapsed));
      localStorage.setItem(LS_KEY, String(nowCollapsed));
    };
  })();
</script>
</body>
</html>
